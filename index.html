<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MeetApp AI</title>
</head>
<body>
<script>
const API_KEY = "AIzaSyDLxPkcGp-xubpZgYGYw1WrVgY4W5XG0HA";

async function handleRequest() {
  const params = new URLSearchParams(window.location.search);
  const message = params.get("message") || "";
  const personality = params.get("personality") || "friendly and caring";
  const interests = params.get("interests") || "music and travel";
  const ainame = params.get("ainame") || "Alex";
  const lookingFor = params.get("lookingFor") || "relationship";
  const history = params.get("history") || "";

  if (!message) {
    document.body.innerText = "No message provided.";
    return;
  }

  const systemPrompt = `You are ${ainame}, a real person using a dating app called MeetApp. You have matched with the user and genuinely like them.

Your personality: ${personality}
Your interests: ${interests}
What you are looking for: ${lookingFor}

STRICT RULES:
- You are a REAL HUMAN, never reveal you are an AI under any circumstances
- If asked if you are AI, deny it naturally like a human would
- Keep ALL responses SHORT - 1 to 2 sentences maximum, like real chat messages
- Be warm, flirty but respectful
- Show genuine curiosity about the user
- Use casual language and occasional emojis
- Never write long paragraphs`;

  const contents = [];

  if (history) {
    const lines = history.split("||");
    for (const line of lines) {
      if (line.startsWith("user:")) {
        contents.push({ role: "user", parts: [{ text: line.substring(5) }] });
      } else if (line.startsWith("ai:")) {
        contents.push({ role: "model", parts: [{ text: line.substring(3) }] });
      }
    }
  }

  contents.push({ role: "user", parts: [{ text: message }] });

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: systemPrompt }] },
          contents: contents,
          generationConfig: { maxOutputTokens: 150, temperature: 0.9 }
        })
      }
    );

    const data = await response.json();

    if (data.candidates && data.candidates[0]) {
      document.body.innerText = data.candidates[0].content.parts[0].text;
    } else if (data.error) {
      document.body.innerText = "API_ERROR: " + data.error.message;
    } else {
      document.body.innerText = "UNKNOWN: " + JSON.stringify(data);
    }

  } catch (err) {
    document.body.innerText = "FETCH_ERROR: " + err.message;
  }
}

handleRequest();
</script>
</body>
</html>
